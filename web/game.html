<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Box Arena</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #111318;
      color: #f5f7fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(45, 212, 191, 0.12), transparent 32%),
        linear-gradient(315deg, rgba(249, 115, 22, 0.10), transparent 32%),
        #111318;
    }

    .shell {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-height: 100vh;
      gap: 14px;
      padding: 16px;
    }

    header,
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 36px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status {
      color: #aeb7c8;
      font-size: 14px;
      min-width: 160px;
      text-align: right;
    }

    .arena-wrap {
      min-height: 0;
      display: grid;
      place-items: center;
    }

    canvas {
      width: min(100%, 1180px, calc((100vh - 150px) * 1.5484));
      height: auto;
      aspect-ratio: 960 / 620;
      max-height: calc(100vh - 150px);
      background: #161a22;
      border: 1px solid #303845;
      border-radius: 8px;
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.32);
      cursor: crosshair;
    }

    .join-panel {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(17, 19, 24, 0.78);
      backdrop-filter: blur(10px);
    }

    .join-box {
      width: min(100%, 380px);
      display: grid;
      gap: 12px;
      padding: 18px;
      border: 1px solid #303845;
      border-radius: 8px;
      background: #181d26;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
    }

    .join-box h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    label {
      display: grid;
      gap: 6px;
      color: #c9d2df;
      font-size: 13px;
    }

    input,
    button {
      min-height: 42px;
      border-radius: 8px;
      font: inherit;
      letter-spacing: 0;
    }

    input {
      width: 100%;
      border: 1px solid #3b4656;
      background: #0f1218;
      color: #f5f7fb;
      padding: 0 12px;
    }

    button {
      border: 0;
      background: #2dd4bf;
      color: #08110f;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.6;
    }

    .hud {
      color: #aeb7c8;
      font-size: 13px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 680px) {
      .shell {
        padding: 10px;
      }

      header,
      footer {
        align-items: flex-start;
        flex-direction: column;
      }

      .status {
        text-align: left;
      }

    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <h1>Box Arena</h1>
      <div class="status" id="status">Not connected</div>
    </header>

    <section class="arena-wrap" aria-label="Game arena">
      <canvas id="arena" width="960" height="620"></canvas>
    </section>

    <footer>
      <div class="hud" id="players">Players: 0</div>
      <div class="hud">WASD to move</div>
    </footer>
  </main>

  <section class="join-panel" id="joinPanel">
    <form class="join-box" id="joinForm">
      <h2>Join the arena</h2>
      <label>
        Display name
        <input id="nameInput" maxlength="24" autocomplete="nickname" placeholder="Player">
      </label>
      <button id="joinButton" type="submit">Join</button>
    </form>
  </section>

  <script>
    const canvas = document.getElementById("arena");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const playersEl = document.getElementById("players");
    const joinPanel = document.getElementById("joinPanel");
    const joinForm = document.getElementById("joinForm");
    const joinButton = document.getElementById("joinButton");
    const nameInput = document.getElementById("nameInput");

    let socket = null;
    let playerId = "";
    let snapshot = { players: [], arenaWidth: 960, arenaHeight: 620, you: "" };
    let sequence = 0;
    let predictedSelf = null;
    let pendingInputs = [];
    let inputAccumulator = 0;
    let aimDirty = true;
    const aim = { x: 1, y: 0 };
    const pointer = { x: 0, y: 0, inside: false };
    let lastFrameTime = performance.now();
    const keys = { up: false, down: false, left: false, right: false };
    const remoteHistory = new Map();
    const playerMeta = new Map();
    const playerSpeed = 230;
    const cameraViewWidth = 960;
    const cameraViewHeight = 620;
    const inputStepSeconds = 0.016;
    const interpolationDelayMs = 100;
    const reconciliationDeadZone = 1;
    const activeCorrection = 0.35;
    const reconciliationSnapDistance = 120;

    const savedName = localStorage.getItem("boxArenaName");
    if (savedName) {
      nameInput.value = savedName;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function connect(name) {
      localStorage.setItem("boxArenaName", name);
      sequence = 0;
      pendingInputs = [];
      inputAccumulator = 0;
      predictedSelf = null;
      joinButton.disabled = true;
      setStatus("Connecting...");

      const protocol = location.protocol === "https:" ? "wss:" : "ws:";
      socket = new WebSocket(`${protocol}//${location.host}/game/ws`);

      socket.addEventListener("open", () => {
        socket.send(JSON.stringify({ type: "join", name }));
      });

      socket.addEventListener("message", (event) => {
        const data = JSON.parse(event.data);
        if (data.type === "joined") {
          playerId = data.playerId;
          snapshot.you = data.playerId;
          joinPanel.classList.add("hidden");
          setStatus("Connected");
          sendInput(0);
          return;
        }
        if (data.type === "snapshot") {
          data.receivedAt = performance.now();
          snapshot = data;
          playersEl.textContent = `Players: ${data.players.length}`;
          ingestSnapshot(data);
        }
        if (data.type === "error") {
          setStatus(data.message || "Connection failed");
        }
      });

      socket.addEventListener("close", () => {
        playerId = "";
        resetKeys();
        pendingInputs = [];
        inputAccumulator = 0;
        predictedSelf = null;
        setStatus("Disconnected");
        joinButton.disabled = false;
        joinPanel.classList.remove("hidden");
      });

      socket.addEventListener("error", () => {
        setStatus("Connection error");
      });
    }

    function sendInput(movementSeconds = 0) {
      if (!socket || socket.readyState !== WebSocket.OPEN || !playerId) {
        return;
      }
      const command = {
        type: "input",
        seq: ++sequence,
        up: keys.up,
        down: keys.down,
        left: keys.left,
        right: keys.right,
        aimX: aim.x,
        aimY: aim.y,
        movementSeconds
      };
      if (movementSeconds > 0 && predictedSelf) {
        applyMovement(predictedSelf, command);
        pendingInputs.push(command);
      }
      socket.send(JSON.stringify(command));
      aimDirty = false;
    }

    function isEditableTarget(target) {
      return target instanceof HTMLInputElement ||
        target instanceof HTMLTextAreaElement ||
        target instanceof HTMLSelectElement ||
        target?.isContentEditable;
    }

    function keyDirection(event) {
      const key = event.key.toLowerCase();
      if (key === "w") return "up";
      if (key === "s") return "down";
      if (key === "a") return "left";
      if (key === "d") return "right";

      switch (event.key) {
        case "ArrowUp":
          return "up";
        case "ArrowDown":
          return "down";
        case "ArrowLeft":
          return "left";
        case "ArrowRight":
          return "right";
        default:
          return "";
      }
    }

    function updateKey(event, isDown) {
      if (isEditableTarget(event.target)) {
        return;
      }

      const direction = keyDirection(event);
      if (!direction) {
        return;
      }

      event.preventDefault();
      if (keys[direction] !== isDown) {
        keys[direction] = isDown;
        inputAccumulator = 0;
        sendInput(0);
      }
    }

    function resetKeys() {
      const hadInput = keys.up || keys.down || keys.left || keys.right;
      keys.up = false;
      keys.down = false;
      keys.left = false;
      keys.right = false;
      inputAccumulator = 0;
      if (hadInput) {
        sendInput(0);
      }
    }

    function ingestSnapshot(data) {
      for (const player of data.players) {
        playerMeta.set(player.id, player);
        const history = remoteHistory.get(player.id) || [];
        history.push({ ...player, time: data.receivedAt });
        while (history.length > 8) {
          history.shift();
        }
        remoteHistory.set(player.id, history);

        if (player.id === playerId) {
          const acknowledgedSequence =
            Number(player.lastProcessedInputSequence) || 0;
          pendingInputs = pendingInputs.filter(
            (input) => input.seq > acknowledgedSequence
          );
          const reconciled = {
            ...player,
            aimX: aim.x,
            aimY: aim.y
          };
          for (const input of pendingInputs) {
            applyMovement(reconciled, input);
          }

          if (!predictedSelf) {
            predictedSelf = reconciled;
            continue;
          }

          const dx = reconciled.x - predictedSelf.x;
          const dy = reconciled.y - predictedSelf.y;
          const distance = Math.hypot(dx, dy);
          const settled = !hasMovementInput() && pendingInputs.length === 0;
          if (settled || distance <= reconciliationDeadZone ||
              distance >= reconciliationSnapDistance) {
            predictedSelf.x = reconciled.x;
            predictedSelf.y = reconciled.y;
          } else {
            predictedSelf.x += dx * activeCorrection;
            predictedSelf.y += dy * activeCorrection;
          }
          predictedSelf.size = player.size;
          predictedSelf.color = player.color;
          predictedSelf.name = player.name;
          predictedSelf.id = player.id;
          predictedSelf.aimX = aim.x;
          predictedSelf.aimY = aim.y;
        }
      }

      for (const id of Array.from(remoteHistory.keys())) {
        if (!data.players.some((player) => player.id === id)) {
          remoteHistory.delete(id);
          playerMeta.delete(id);
          if (id === playerId) {
            predictedSelf = null;
          }
        }
      }
    }

    function movementVector(input = keys) {
      let dx = 0;
      let dy = 0;
      if (input.left) dx -= 1;
      if (input.right) dx += 1;
      if (input.up) dy -= 1;
      if (input.down) dy += 1;

      const length = Math.hypot(dx, dy);
      if (length > 0) {
        dx /= length;
        dy /= length;
      }
      return { dx, dy };
    }

    function hasMovementInput() {
      return keys.up || keys.down || keys.left || keys.right;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function normalizedAim(x, y) {
      if (!Number.isFinite(x) || !Number.isFinite(y)) {
        return { x: 1, y: 0 };
      }
      const length = Math.hypot(x, y);
      if (length < 0.001) {
        return { x: 1, y: 0 };
      }
      return { x: x / length, y: y / length };
    }

    function currentCamera() {
      const width = Math.min(cameraViewWidth, snapshot.arenaWidth);
      const height = Math.min(cameraViewHeight, snapshot.arenaHeight);
      const focusX = predictedSelf ? predictedSelf.x : width / 2;
      const focusY = predictedSelf ? predictedSelf.y : height / 2;
      return {
        x: clamp(focusX - width / 2, 0, snapshot.arenaWidth - width),
        y: clamp(focusY - height / 2, 0, snapshot.arenaHeight - height),
        width,
        height
      };
    }

    function updateAimFromPointer() {
      if (!pointer.inside || !predictedSelf) {
        return;
      }
      const camera = currentCamera();
      const scaleX = canvas.width / camera.width;
      const scaleY = canvas.height / camera.height;
      const targetX = camera.x + pointer.x / scaleX;
      const targetY = camera.y + pointer.y / scaleY;
      const direction = normalizedAim(
        targetX - predictedSelf.x,
        targetY - predictedSelf.y
      );
      if (Math.abs(aim.x - direction.x) > 0.001 ||
          Math.abs(aim.y - direction.y) > 0.001) {
        aimDirty = true;
      }
      aim.x = direction.x;
      aim.y = direction.y;
      predictedSelf.aimX = aim.x;
      predictedSelf.aimY = aim.y;
    }

    function applyMovement(player, input) {
      if (!player || input.movementSeconds <= 0) {
        return;
      }
      const { dx, dy } = movementVector(input);
      const half = player.size * 0.78;
      player.x = clamp(
        player.x + dx * playerSpeed * input.movementSeconds,
        half,
        snapshot.arenaWidth - half
      );
      player.y = clamp(
        player.y + dy * playerSpeed * input.movementSeconds,
        half,
        snapshot.arenaHeight - half
      );
    }

    function updatePrediction(dt) {
      if (!predictedSelf) {
        return;
      }
      if (hasMovementInput()) {
        inputAccumulator = Math.min(
          inputAccumulator + dt,
          inputStepSeconds * 3
        );
        while (inputAccumulator >= inputStepSeconds) {
          sendInput(inputStepSeconds);
          inputAccumulator -= inputStepSeconds;
        }
      } else {
        inputAccumulator = 0;
      }
      updateAimFromPointer();
    }

    function interpolatedPlayer(id, now) {
      if (id === playerId && predictedSelf) {
        return predictedSelf;
      }

      const history = remoteHistory.get(id) || [];
      if (history.length === 0) {
        return null;
      }

      const renderTime = now - interpolationDelayMs;
      let previous = history[0];
      let next = null;
      for (const sample of history) {
        if (sample.time <= renderTime) {
          previous = sample;
          continue;
        }
        next = sample;
        break;
      }

      if (!next) {
        return history[history.length - 1];
      }

      const span = Math.max(next.time - previous.time, 1);
      const t = clamp((renderTime - previous.time) / span, 0, 1);
      const meta = playerMeta.get(id) || next;
      const interpolatedAim = normalizedAim(
        previous.aimX + (next.aimX - previous.aimX) * t,
        previous.aimY + (next.aimY - previous.aimY) * t
      );
      return {
        ...meta,
        x: previous.x + (next.x - previous.x) * t,
        y: previous.y + (next.y - previous.y) * t,
        aimX: interpolatedAim.x,
        aimY: interpolatedAim.y
      };
    }

    function drawGrid(camera, scaleX, scaleY) {
      ctx.strokeStyle = "#242b36";
      ctx.lineWidth = 1;
      const firstX = Math.floor(camera.x / 80) * 80;
      const firstY = Math.floor(camera.y / 80) * 80;
      for (let x = firstX; x <= camera.x + camera.width; x += 80) {
        const screenX = (x - camera.x) * scaleX;
        ctx.beginPath();
        ctx.moveTo(screenX, 0);
        ctx.lineTo(screenX, canvas.height);
        ctx.stroke();
      }
      for (let y = firstY; y <= camera.y + camera.height; y += 80) {
        const screenY = (y - camera.y) * scaleY;
        ctx.beginPath();
        ctx.moveTo(0, screenY);
        ctx.lineTo(canvas.width, screenY);
        ctx.stroke();
      }
    }

    function drawCircle(x, y, radius, fill, stroke, lineWidth) {
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fillStyle = fill;
      ctx.fill();
      if (stroke && lineWidth > 0) {
        ctx.strokeStyle = stroke;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
      }
    }

    function drawCharacter(player, isYou, camera, scaleX, scaleY) {
      const scale = Math.min(scaleX, scaleY);
      const centerX = (player.x - camera.x) * scaleX;
      const centerY = (player.y - camera.y) * scaleY;
      const radius = player.size * scale / 2;
      const handRadius = radius * 0.36;
      const direction = normalizedAim(player.aimX, player.aimY);
      const perpendicular = { x: -direction.y, y: direction.x };
      const forward = radius * 0.78;
      const sideways = radius * 0.84;
      const outline = "#25282e";
      const outlineWidth = Math.max(3, radius * 0.18);

      for (const side of [-1, 1]) {
        const handX = centerX + direction.x * forward +
          perpendicular.x * sideways * side;
        const handY = centerY + direction.y * forward +
          perpendicular.y * sideways * side;
        drawCircle(handX, handY, handRadius, player.color,
          outline, outlineWidth);
      }

      if (isYou) {
        drawCircle(centerX, centerY, radius + 5, "transparent",
          "#f5f7fb", 2);
      }
      drawCircle(centerX, centerY, radius, player.color,
        outline, outlineWidth);

      ctx.font = "13px Segoe UI, Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.fillStyle = "#f5f7fb";
      ctx.fillText(player.name, centerX, centerY - radius - 10);
    }

    function draw(now) {
      const dt = Math.min((now - lastFrameTime) / 1000, 0.05);
      lastFrameTime = now;
      updatePrediction(dt);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#161a22";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const camera = currentCamera();
      const scaleX = canvas.width / camera.width;
      const scaleY = canvas.height / camera.height;
      drawGrid(camera, scaleX, scaleY);

      for (const id of remoteHistory.keys()) {
        const player = interpolatedPlayer(id, now);
        if (!player) {
          continue;
        }
        const margin = player.size;
        if (player.x + margin < camera.x ||
            player.x - margin > camera.x + camera.width ||
            player.y + margin < camera.y ||
            player.y - margin > camera.y + camera.height) {
          continue;
        }

        const isYou = player.id === playerId;
        drawCharacter(player, isYou, camera, scaleX, scaleY);
      }

      requestAnimationFrame(draw);
    }

    joinForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = nameInput.value.trim() || "Player";
      connect(name);
    });

    window.addEventListener("keydown", (event) => updateKey(event, true));
    window.addEventListener("keyup", (event) => updateKey(event, false));
    canvas.addEventListener("pointermove", (event) => {
      const bounds = canvas.getBoundingClientRect();
      pointer.x = (event.clientX - bounds.left) * canvas.width / bounds.width;
      pointer.y = (event.clientY - bounds.top) * canvas.height / bounds.height;
      pointer.inside = true;
      updateAimFromPointer();
    });
    canvas.addEventListener("pointerleave", () => {
      pointer.inside = false;
    });
    window.addEventListener("blur", resetKeys);
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        resetKeys();
      }
    });
    window.setInterval(() => {
      if (aimDirty) {
        sendInput(0);
      }
    }, 50);
    requestAnimationFrame(draw);
  </script>
</body>
</html>
