<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Box Arena</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #111318;
      color: #f5f7fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(45, 212, 191, 0.12), transparent 32%),
        linear-gradient(315deg, rgba(249, 115, 22, 0.10), transparent 32%),
        #111318;
    }

    .shell {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-height: 100vh;
      gap: 14px;
      padding: 16px;
    }

    header,
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 36px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .status {
      color: #aeb7c8;
      font-size: 14px;
      min-width: 160px;
      text-align: right;
    }

    .arena-wrap {
      min-height: 0;
      display: grid;
      place-items: center;
    }

    canvas {
      width: min(100%, 1180px);
      height: min(72vh, 720px);
      max-height: calc(100vh - 150px);
      background: #161a22;
      border: 1px solid #303845;
      border-radius: 8px;
      box-shadow: 0 18px 46px rgba(0, 0, 0, 0.32);
    }

    .join-panel {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(17, 19, 24, 0.78);
      backdrop-filter: blur(10px);
    }

    .join-box {
      width: min(100%, 380px);
      display: grid;
      gap: 12px;
      padding: 18px;
      border: 1px solid #303845;
      border-radius: 8px;
      background: #181d26;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
    }

    .join-box h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    label {
      display: grid;
      gap: 6px;
      color: #c9d2df;
      font-size: 13px;
    }

    input,
    button {
      min-height: 42px;
      border-radius: 8px;
      font: inherit;
      letter-spacing: 0;
    }

    input {
      width: 100%;
      border: 1px solid #3b4656;
      background: #0f1218;
      color: #f5f7fb;
      padding: 0 12px;
    }

    button {
      border: 0;
      background: #2dd4bf;
      color: #08110f;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.6;
    }

    .hud {
      color: #aeb7c8;
      font-size: 13px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 680px) {
      .shell {
        padding: 10px;
      }

      header,
      footer {
        align-items: flex-start;
        flex-direction: column;
      }

      .status {
        text-align: left;
      }

      canvas {
        height: 70vh;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <h1>Box Arena</h1>
      <div class="status" id="status">Not connected</div>
    </header>

    <section class="arena-wrap" aria-label="Game arena">
      <canvas id="arena" width="960" height="620"></canvas>
    </section>

    <footer>
      <div class="hud" id="players">Players: 0</div>
      <div class="hud">WASD to move</div>
    </footer>
  </main>

  <section class="join-panel" id="joinPanel">
    <form class="join-box" id="joinForm">
      <h2>Join the arena</h2>
      <label>
        Display name
        <input id="nameInput" maxlength="24" autocomplete="nickname" placeholder="Player">
      </label>
      <button id="joinButton" type="submit">Join</button>
    </form>
  </section>

  <script>
    const canvas = document.getElementById("arena");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const playersEl = document.getElementById("players");
    const joinPanel = document.getElementById("joinPanel");
    const joinForm = document.getElementById("joinForm");
    const joinButton = document.getElementById("joinButton");
    const nameInput = document.getElementById("nameInput");

    let socket = null;
    let playerId = "";
    let snapshot = { players: [], arenaWidth: 960, arenaHeight: 620, you: "" };
    let sequence = 0;
    let predictedSelf = null;
    let lastFrameTime = performance.now();
    const keys = { up: false, down: false, left: false, right: false };
    const remoteHistory = new Map();
    const playerMeta = new Map();
    const playerSpeed = 230;
    const interpolationDelayMs = 100;

    const savedName = localStorage.getItem("boxArenaName");
    if (savedName) {
      nameInput.value = savedName;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function connect(name) {
      localStorage.setItem("boxArenaName", name);
      joinButton.disabled = true;
      setStatus("Connecting...");

      const protocol = location.protocol === "https:" ? "wss:" : "ws:";
      socket = new WebSocket(`${protocol}//${location.host}/game/ws`);

      socket.addEventListener("open", () => {
        socket.send(JSON.stringify({ type: "join", name }));
      });

      socket.addEventListener("message", (event) => {
        const data = JSON.parse(event.data);
        if (data.type === "joined") {
          playerId = data.playerId;
          snapshot.you = data.playerId;
          joinPanel.classList.add("hidden");
          setStatus("Connected");
          sendInput();
          return;
        }
        if (data.type === "snapshot") {
          data.receivedAt = performance.now();
          snapshot = data;
          playersEl.textContent = `Players: ${data.players.length}`;
          ingestSnapshot(data);
        }
        if (data.type === "error") {
          setStatus(data.message || "Connection failed");
        }
      });

      socket.addEventListener("close", () => {
        playerId = "";
        resetKeys();
        setStatus("Disconnected");
        joinButton.disabled = false;
        joinPanel.classList.remove("hidden");
      });

      socket.addEventListener("error", () => {
        setStatus("Connection error");
      });
    }

    function sendInput() {
      if (!socket || socket.readyState !== WebSocket.OPEN || !playerId) {
        return;
      }
      socket.send(JSON.stringify({
        type: "input",
        seq: ++sequence,
        up: keys.up,
        down: keys.down,
        left: keys.left,
        right: keys.right
      }));
    }

    function isEditableTarget(target) {
      return target instanceof HTMLInputElement ||
        target instanceof HTMLTextAreaElement ||
        target instanceof HTMLSelectElement ||
        target?.isContentEditable;
    }

    function keyDirection(event) {
      const key = event.key.toLowerCase();
      if (key === "w") return "up";
      if (key === "s") return "down";
      if (key === "a") return "left";
      if (key === "d") return "right";

      switch (event.key) {
        case "ArrowUp":
          return "up";
        case "ArrowDown":
          return "down";
        case "ArrowLeft":
          return "left";
        case "ArrowRight":
          return "right";
        default:
          return "";
      }
    }

    function updateKey(event, isDown) {
      if (isEditableTarget(event.target)) {
        return;
      }

      const direction = keyDirection(event);
      if (!direction) {
        return;
      }

      event.preventDefault();
      if (keys[direction] !== isDown) {
        keys[direction] = isDown;
        sendInput();
      }
    }

    function resetKeys() {
      const hadInput = keys.up || keys.down || keys.left || keys.right;
      keys.up = false;
      keys.down = false;
      keys.left = false;
      keys.right = false;
      if (hadInput) {
        sendInput();
      }
    }

    function ingestSnapshot(data) {
      for (const player of data.players) {
        playerMeta.set(player.id, player);
        const history = remoteHistory.get(player.id) || [];
        history.push({ ...player, time: data.receivedAt });
        while (history.length > 8) {
          history.shift();
        }
        remoteHistory.set(player.id, history);

        if (player.id === playerId) {
          if (!predictedSelf) {
            predictedSelf = { ...player };
            continue;
          }

          const dx = player.x - predictedSelf.x;
          const dy = player.y - predictedSelf.y;
          const distance = Math.hypot(dx, dy);
          const correction = distance > 120 ? 1 : 0.18;
          predictedSelf.x += dx * correction;
          predictedSelf.y += dy * correction;
          predictedSelf.size = player.size;
          predictedSelf.color = player.color;
          predictedSelf.name = player.name;
          predictedSelf.id = player.id;
        }
      }

      for (const id of Array.from(remoteHistory.keys())) {
        if (!data.players.some((player) => player.id === id)) {
          remoteHistory.delete(id);
          playerMeta.delete(id);
          if (id === playerId) {
            predictedSelf = null;
          }
        }
      }
    }

    function movementVector() {
      let dx = 0;
      let dy = 0;
      if (keys.left) dx -= 1;
      if (keys.right) dx += 1;
      if (keys.up) dy -= 1;
      if (keys.down) dy += 1;

      const length = Math.hypot(dx, dy);
      if (length > 0) {
        dx /= length;
        dy /= length;
      }
      return { dx, dy };
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function updatePrediction(dt) {
      if (!predictedSelf) {
        return;
      }
      const { dx, dy } = movementVector();
      const half = predictedSelf.size / 2;
      predictedSelf.x = clamp(predictedSelf.x + dx * playerSpeed * dt,
        half, snapshot.arenaWidth - half);
      predictedSelf.y = clamp(predictedSelf.y + dy * playerSpeed * dt,
        half, snapshot.arenaHeight - half);
    }

    function interpolatedPlayer(id, now) {
      if (id === playerId && predictedSelf) {
        return predictedSelf;
      }

      const history = remoteHistory.get(id) || [];
      if (history.length === 0) {
        return null;
      }

      const renderTime = now - interpolationDelayMs;
      let previous = history[0];
      let next = null;
      for (const sample of history) {
        if (sample.time <= renderTime) {
          previous = sample;
          continue;
        }
        next = sample;
        break;
      }

      if (!next) {
        return history[history.length - 1];
      }

      const span = Math.max(next.time - previous.time, 1);
      const t = clamp((renderTime - previous.time) / span, 0, 1);
      const meta = playerMeta.get(id) || next;
      return {
        ...meta,
        x: previous.x + (next.x - previous.x) * t,
        y: previous.y + (next.y - previous.y) * t
      };
    }

    function drawGrid(scaleX, scaleY) {
      ctx.strokeStyle = "#242b36";
      ctx.lineWidth = 1;
      for (let x = 0; x <= snapshot.arenaWidth; x += 80) {
        ctx.beginPath();
        ctx.moveTo(x * scaleX, 0);
        ctx.lineTo(x * scaleX, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= snapshot.arenaHeight; y += 80) {
        ctx.beginPath();
        ctx.moveTo(0, y * scaleY);
        ctx.lineTo(canvas.width, y * scaleY);
        ctx.stroke();
      }
    }

    function draw(now) {
      const dt = Math.min((now - lastFrameTime) / 1000, 0.05);
      lastFrameTime = now;
      updatePrediction(dt);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#161a22";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const scaleX = canvas.width / snapshot.arenaWidth;
      const scaleY = canvas.height / snapshot.arenaHeight;
      drawGrid(scaleX, scaleY);

      for (const id of remoteHistory.keys()) {
        const player = interpolatedPlayer(id, now);
        if (!player) {
          continue;
        }

        const size = player.size * Math.min(scaleX, scaleY);
        const x = player.x * scaleX - size / 2;
        const y = player.y * scaleY - size / 2;
        const isYou = player.id === playerId;

        ctx.fillStyle = player.color;
        ctx.fillRect(x, y, size, size);

        if (isYou) {
          ctx.strokeStyle = "#f5f7fb";
          ctx.lineWidth = 3;
          ctx.strokeRect(x - 3, y - 3, size + 6, size + 6);
        }

        ctx.font = "13px Segoe UI, Arial, sans-serif";
        ctx.textAlign = "center";
        ctx.fillStyle = "#f5f7fb";
        ctx.fillText(player.name, player.x * scaleX, y - 8);
      }

      requestAnimationFrame(draw);
    }

    joinForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = nameInput.value.trim() || "Player";
      connect(name);
    });

    window.addEventListener("keydown", (event) => updateKey(event, true));
    window.addEventListener("keyup", (event) => updateKey(event, false));
    window.addEventListener("blur", resetKeys);
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        resetKeys();
      }
    });
    window.setInterval(sendInput, 50);
    requestAnimationFrame(draw);
  </script>
</body>
</html>
