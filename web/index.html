<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>gRPC Chat</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f0e8;
        color: #1f2933;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(1040px, 100%);
        min-height: min(760px, calc(100vh - 48px));
        display: grid;
        grid-template-columns: minmax(0, 1fr) 260px;
        background: #fffdf8;
        border: 1px solid #d8d2c6;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(31, 41, 51, 0.16);
      }

      .chat {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-width: 0;
      }

      header {
        padding: 18px 20px;
        border-bottom: 1px solid #e2dccf;
        background: #0f766e;
        color: #ffffff;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 750;
      }

      .status {
        margin-top: 4px;
        min-height: 20px;
        color: #ccfbf1;
        font-size: 14px;
      }

      #messages {
        min-height: 0;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: #fffaf0;
      }

      .message {
        width: fit-content;
        max-width: min(620px, 92%);
        padding: 10px 12px;
        border: 1px solid #d8d2c6;
        border-radius: 8px;
        background: #ffffff;
      }

      .message.own {
        align-self: flex-end;
        border-color: #99f6e4;
        background: #ecfeff;
      }

      .system {
        align-self: center;
        max-width: 92%;
        color: #5f6c7b;
        font-size: 14px;
      }

      .name {
        margin-bottom: 4px;
        color: #0f766e;
        font-size: 13px;
        font-weight: 700;
      }

      .text {
        overflow-wrap: anywhere;
        line-height: 1.4;
      }

      form {
        display: flex;
        gap: 10px;
        padding: 16px;
        border-top: 1px solid #e2dccf;
        background: #ffffff;
      }

      input,
      button {
        min-height: 42px;
        border-radius: 8px;
        font: inherit;
      }

      input {
        min-width: 0;
        width: 100%;
        border: 1px solid #c8c1b4;
        padding: 0 12px;
        background: #fffdf8;
      }

      button {
        border: 0;
        padding: 0 16px;
        background: #0f766e;
        color: #ffffff;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      aside {
        border-left: 1px solid #e2dccf;
        background: #f7f5ef;
        padding: 20px;
      }

      aside h2 {
        margin: 0 0 12px;
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 0;
        color: #59636f;
      }

      #users {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      #users li {
        padding: 8px 10px;
        border-radius: 8px;
        background: #ffffff;
        border: 1px solid #e2dccf;
        overflow-wrap: anywhere;
      }

      dialog {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid #d8d2c6;
        border-radius: 8px;
        padding: 0;
        box-shadow: 0 24px 80px rgba(31, 41, 51, 0.24);
      }

      dialog::backdrop {
        background: rgba(31, 41, 51, 0.42);
      }

      .join {
        display: grid;
        gap: 12px;
        padding: 20px;
      }

      .join h2 {
        margin: 0;
        font-size: 22px;
      }

      .join p {
        margin: 0 0 4px;
        color: #5f6c7b;
      }

      .join form {
        display: grid;
        padding: 0;
        border: 0;
      }

      @media (max-width: 760px) {
        body {
          padding: 0;
        }

        main {
          min-height: 100vh;
          border: 0;
          border-radius: 0;
          grid-template-columns: 1fr;
        }

        aside {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="chat">
        <header>
          <h1>gRPC Chat</h1>
          <div id="status" class="status">Joining...</div>
        </header>
        <div id="messages" aria-live="polite"></div>
        <form id="messageForm">
          <input id="messageInput" name="text" autocomplete="off" placeholder="Write a message" disabled>
          <button id="sendButton" type="submit" disabled>Send</button>
        </form>
      </section>
      <aside>
        <h2>Online</h2>
        <ul id="users"></ul>
      </aside>
    </main>

    <dialog id="joinDialog">
      <div class="join">
        <h2>Join the chat</h2>
        <p>Pick a display name and room.</p>
        <form id="joinForm">
          <input name="name" autocomplete="name" placeholder="Display name" required maxlength="40">
          <input name="room" value="lobby" placeholder="Room" maxlength="40">
          <button type="submit">Join</button>
        </form>
      </div>
    </dialog>

    <script>
      const joinDialog = document.querySelector("#joinDialog");
      const joinForm = document.querySelector("#joinForm");
      const messageForm = document.querySelector("#messageForm");
      const messageInput = document.querySelector("#messageInput");
      const sendButton = document.querySelector("#sendButton");
      const messages = document.querySelector("#messages");
      const statusLine = document.querySelector("#status");
      const users = document.querySelector("#users");

      let session = null;
      let events = null;
      let lastEventId = 0;
      let pollTimer = null;

      function addSystem(text) {
        if (!text) return;
        const row = document.createElement("div");
        row.className = "system";
        row.textContent = text;
        messages.append(row);
        messages.scrollTop = messages.scrollHeight;
      }

      function addMessage(message) {
        const row = document.createElement("div");
        const isOwn = session && message.displayName === session.displayName;
        row.className = `message${isOwn ? " own" : ""}`;

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = message.displayName || "Anonymous";

        const text = document.createElement("div");
        text.className = "text";
        text.textContent = message.text;

        row.append(name, text);
        messages.append(row);
        messages.scrollTop = messages.scrollHeight;
      }

      function updateUsers(activeUsers) {
        users.replaceChildren();
        for (const user of activeUsers || []) {
          const item = document.createElement("li");
          item.textContent = user;
          users.append(item);
        }
      }

      function handleEventPayload(payload) {
        if (payload.eventId && payload.eventId <= lastEventId) return;
        if (payload.eventId) lastEventId = payload.eventId;
        updateUsers(payload.activeUsers);
        if (payload.message) {
          addMessage(payload.message);
        } else {
          addSystem(payload.systemText);
        }
      }

      async function pollMessages() {
        if (!session) return;
        const params = new URLSearchParams({
          room: session.room,
          afterEventId: String(lastEventId)
        });

        try {
          const response = await fetch(`/messages?${params.toString()}`, {
            cache: "no-store"
          });
          if (!response.ok) return;
          const payload = await response.json();
          for (const event of payload.events || []) {
            handleEventPayload(event);
          }
        } catch {
          statusLine.textContent = "Connected by polling fallback";
        }
      }

      function startPollingFallback() {
        if (pollTimer) clearInterval(pollTimer);
        pollMessages();
        pollTimer = setInterval(pollMessages, 1500);
      }

      function connectEvents() {
        const params = new URLSearchParams({
          userId: session.userId,
          room: session.room
        });
        events = new EventSource(`/events?${params.toString()}`);

        events.onopen = () => {
          statusLine.textContent = `Connected to ${session.room} as ${session.displayName}`;
        };

        events.onmessage = (event) => {
          handleEventPayload(JSON.parse(event.data));
        };

        events.onerror = () => {
          statusLine.textContent = "Live stream interrupted. Polling for updates...";
        };
      }

      joinForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const body = new URLSearchParams(new FormData(joinForm));
        const response = await fetch("/join", { method: "POST", body });
        if (!response.ok) {
          addSystem("Could not join the chat.");
          return;
        }

        session = await response.json();
        joinDialog.close();
        messageInput.disabled = false;
        sendButton.disabled = false;
        messageInput.focus();
        addSystem(session.message);
        connectEvents();
        startPollingFallback();
      });

      messageForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = messageInput.value.trim();
        if (!text || !session) return;

        messageInput.value = "";
        const body = new URLSearchParams({
          userId: session.userId,
          displayName: session.displayName,
          room: session.room,
          text
        });
        const response = await fetch("/send", { method: "POST", body });
        if (!response.ok) {
          addSystem("Message was not sent.");
        }
      });

      joinDialog.showModal();
    </script>
  </body>
</html>
