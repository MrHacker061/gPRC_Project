<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>gRPC Chat</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f0e8;
        color: #1f2933;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(1040px, 100%);
        min-height: min(760px, calc(100vh - 48px));
        display: grid;
        grid-template-columns: minmax(0, 1fr) 260px;
        background: #fffdf8;
        border: 1px solid #d8d2c6;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(31, 41, 51, 0.16);
      }

      .chat {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-width: 0;
      }

      header {
        padding: 18px 20px;
        border-bottom: 1px solid #e2dccf;
        background: #0f766e;
        color: #ffffff;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 750;
      }

      .status {
        margin-top: 4px;
        min-height: 20px;
        color: #ccfbf1;
        font-size: 14px;
      }

      #messages {
        min-height: 0;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: #fffaf0;
      }

      .message {
        width: fit-content;
        max-width: min(620px, 92%);
        padding: 10px 12px;
        border: 1px solid #d8d2c6;
        border-radius: 8px;
        background: #ffffff;
      }

      .message.own {
        align-self: flex-end;
        border-color: #99f6e4;
        background: #ecfeff;
      }

      .system {
        align-self: center;
        max-width: 92%;
        color: #5f6c7b;
        font-size: 14px;
      }

      .name {
        margin-bottom: 4px;
        color: #0f766e;
        font-size: 13px;
        font-weight: 700;
      }

      .text {
        overflow-wrap: anywhere;
        line-height: 1.4;
      }

      form {
        display: flex;
        gap: 10px;
        padding: 16px;
        border-top: 1px solid #e2dccf;
        background: #ffffff;
      }

      input,
      button {
        min-height: 42px;
        border-radius: 8px;
        font: inherit;
      }

      input {
        min-width: 0;
        width: 100%;
        border: 1px solid #c8c1b4;
        padding: 0 12px;
        background: #fffdf8;
      }

      button {
        border: 0;
        padding: 0 16px;
        background: #0f766e;
        color: #ffffff;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      aside {
        border-left: 1px solid #e2dccf;
        background: #f7f5ef;
        padding: 20px;
        display: grid;
        align-content: start;
        gap: 18px;
      }

      aside h2 {
        margin: 0 0 12px;
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 0;
        color: #59636f;
      }

      #users {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .side-form {
        display: grid;
        gap: 8px;
        padding: 0;
        border: 0;
        background: transparent;
      }

      .inline-check {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #46515f;
        font-size: 14px;
      }

      .inline-check input {
        width: auto;
        min-height: auto;
      }

      .room-list {
        display: grid;
        gap: 8px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .room-list button {
        width: 100%;
        min-height: 36px;
        border: 1px solid #e2dccf;
        background: #ffffff;
        color: #1f2933;
        text-align: left;
      }

      .room-list button.active {
        border-color: #0f766e;
        background: #ccfbf1;
      }

      #typing {
        min-height: 20px;
        padding: 0 20px 12px;
        color: #64748b;
        font-size: 14px;
        background: #fffaf0;
      }

      #users li {
        padding: 8px 10px;
        border-radius: 8px;
        background: #ffffff;
        border: 1px solid #e2dccf;
        overflow-wrap: anywhere;
      }

      dialog {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid #d8d2c6;
        border-radius: 8px;
        padding: 0;
        box-shadow: 0 24px 80px rgba(31, 41, 51, 0.24);
      }

      dialog::backdrop {
        background: rgba(31, 41, 51, 0.42);
      }

      .join {
        display: grid;
        gap: 12px;
        padding: 20px;
      }

      .join h2 {
        margin: 0;
        font-size: 22px;
      }

      .join p {
        margin: 0 0 4px;
        color: #5f6c7b;
      }

      .join form {
        display: grid;
        padding: 0;
        border: 0;
      }

      @media (max-width: 760px) {
        body {
          padding: 0;
        }

        main {
          min-height: 100vh;
          border: 0;
          border-radius: 0;
          grid-template-columns: 1fr;
        }

        aside {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="chat">
        <header>
          <h1>gRPC Chat</h1>
          <div id="status" class="status">Joining...</div>
        </header>
        <div id="messages" aria-live="polite"></div>
        <div id="typing"></div>
        <form id="messageForm">
          <input id="messageInput" name="text" autocomplete="off" placeholder="Write a message" disabled>
          <button id="sendButton" type="submit" disabled>Send</button>
        </form>
      </section>
      <aside>
        <section>
          <h2>Rooms</h2>
          <ul id="rooms" class="room-list"></ul>
        </section>
        <form id="roomForm" class="side-form">
          <input id="roomInput" name="room" autocomplete="off" placeholder="New room" maxlength="40">
          <label class="inline-check">
            <input id="privateRoomInput" name="isPrivate" type="checkbox">
            Private
          </label>
          <input id="roomPasswordInput" name="password" autocomplete="off" placeholder="Password" maxlength="80" hidden>
          <button type="submit">Create</button>
        </form>
        <button id="joinPrivateButton" type="button">Join private</button>
        <section>
          <h2>Online</h2>
          <ul id="users"></ul>
        </section>
      </aside>
    </main>

    <dialog id="joinDialog">
      <div class="join">
        <h2>Join the chat</h2>
        <p>Pick a display name and room.</p>
        <form id="joinForm">
          <input name="name" autocomplete="name" placeholder="Display name" required maxlength="40">
          <input id="joinRoomInput" name="room" value="lobby" placeholder="Room" maxlength="40">
          <button type="submit">Join</button>
        </form>
      </div>
    </dialog>

    <dialog id="privateDialog">
      <div class="join">
        <h2>Join private room</h2>
        <form id="privateJoinForm">
          <input id="privateRoomNameInput" name="room" autocomplete="off" placeholder="Room name" required maxlength="40">
          <input name="password" autocomplete="off" placeholder="Password" required maxlength="80">
          <button type="submit">Join private</button>
        </form>
      </div>
    </dialog>

    <script>
      const joinDialog = document.querySelector("#joinDialog");
      const privateDialog = document.querySelector("#privateDialog");
      const joinForm = document.querySelector("#joinForm");
      const privateJoinForm = document.querySelector("#privateJoinForm");
      const messageForm = document.querySelector("#messageForm");
      const messageInput = document.querySelector("#messageInput");
      const sendButton = document.querySelector("#sendButton");
      const roomForm = document.querySelector("#roomForm");
      const roomInput = document.querySelector("#roomInput");
      const privateRoomInput = document.querySelector("#privateRoomInput");
      const roomPasswordInput = document.querySelector("#roomPasswordInput");
      const joinPrivateButton = document.querySelector("#joinPrivateButton");
      const privateRoomNameInput = document.querySelector("#privateRoomNameInput");
      const joinRoomInput = document.querySelector("#joinRoomInput");
      const messages = document.querySelector("#messages");
      const statusLine = document.querySelector("#status");
      const users = document.querySelector("#users");
      const rooms = document.querySelector("#rooms");
      const typing = document.querySelector("#typing");

      let session = null;
      let events = null;
      let lastEventId = 0;
      let pollTimer = null;
      let roomTimer = null;
      let typingTimer = null;
      let typingUsers = new Set();
      let roomNames = [];
      let privateRoomNames = [];

      function addSystem(text) {
        if (!text) return;
        const row = document.createElement("div");
        row.className = "system";
        row.textContent = text;
        messages.append(row);
        messages.scrollTop = messages.scrollHeight;
      }

      function addMessage(message) {
        const row = document.createElement("div");
        const isOwn = session && message.displayName === session.displayName;
        row.className = `message${isOwn ? " own" : ""}`;

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = message.displayName || "Anonymous";

        const text = document.createElement("div");
        text.className = "text";
        text.textContent = message.text;

        row.append(name, text);
        messages.append(row);
        messages.scrollTop = messages.scrollHeight;
      }

      function updateUsers(activeUsers) {
        users.replaceChildren();
        for (const user of activeUsers || []) {
          const item = document.createElement("li");
          item.textContent = user;
          users.append(item);
        }
      }

      function updateTyping() {
        const names = [...typingUsers].filter((name) => !session || name !== session.displayName);
        if (names.length === 0) {
          typing.textContent = "";
        } else if (names.length === 1) {
          typing.textContent = `${names[0]} is typing...`;
        } else {
          typing.textContent = `${names.slice(0, 3).join(", ")} are typing...`;
        }
      }

      function renderRooms() {
        rooms.replaceChildren();
        for (const room of [...roomNames, ...privateRoomNames]) {
          const item = document.createElement("li");
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = privateRoomNames.includes(room) ? `${room} private` : room;
          if (session && session.room === room) button.classList.add("active");
          button.addEventListener("click", () => {
            joinRoomInput.value = room;
            if (privateRoomNames.includes(room)) {
              privateRoomNameInput.value = room;
              privateDialog.showModal();
            } else if (session && session.room !== room) {
              joinExistingSession(room);
            }
          });
          item.append(button);
          rooms.append(item);
        }
      }

      async function loadRooms() {
        try {
          const response = await fetch("/rooms", { cache: "no-store" });
          if (!response.ok) return;
          const payload = await response.json();
          roomNames = (payload.rooms || []).map((room) => room.name);
          renderRooms();
        } catch {
          // Room list is a convenience; joining by name still works.
        }
      }

      async function loadHistory() {
        if (!session) return;
        messages.replaceChildren();
        typingUsers.clear();
        updateTyping();
        const params = new URLSearchParams({ room: session.room, limit: "80" });
        const response = await fetch(`/history?${params.toString()}`, { cache: "no-store" });
        if (!response.ok) return;
        const payload = await response.json();
        lastEventId = Math.max(lastEventId, payload.lastEventId || 0);
        for (const event of payload.messages || []) {
          if (event.message) addMessage(event.message);
        }
      }

      function handleEventPayload(payload) {
        if (payload.eventId && payload.eventId <= lastEventId) return;
        if (payload.eventId) lastEventId = payload.eventId;
        updateUsers(payload.activeUsers);
        if (payload.type === "typing") {
          if (payload.isTyping) {
            typingUsers.add(payload.typingUser);
          } else {
            typingUsers.delete(payload.typingUser);
          }
          updateTyping();
          return;
        }
        if (payload.message) {
          typingUsers.delete(payload.message.displayName);
          updateTyping();
          addMessage(payload.message);
        } else {
          addSystem(payload.systemText);
        }
      }

      async function pollMessages() {
        if (!session) return;
        const params = new URLSearchParams({
          room: session.room,
          afterEventId: String(lastEventId)
        });

        try {
          const response = await fetch(`/messages?${params.toString()}`, {
            cache: "no-store"
          });
          if (!response.ok) return;
          const payload = await response.json();
          for (const event of payload.events || []) {
            handleEventPayload(event);
          }
        } catch {
          statusLine.textContent = "Connected by polling fallback";
        }
      }

      function startPollingFallback() {
        if (pollTimer) clearInterval(pollTimer);
        pollMessages();
        pollTimer = setInterval(pollMessages, 1500);
      }

      function startRoomRefresh() {
        if (roomTimer) clearInterval(roomTimer);
        loadRooms();
        roomTimer = setInterval(loadRooms, 2000);
      }

      function connectEvents() {
        if (events) events.close();
        const params = new URLSearchParams({
          userId: session.userId,
          room: session.room
        });
        events = new EventSource(`/events?${params.toString()}`);

        events.onopen = () => {
          statusLine.textContent = `Connected to ${session.room} as ${session.displayName}`;
        };

        events.onmessage = (event) => {
          handleEventPayload(JSON.parse(event.data));
        };

        events.onerror = () => {
          statusLine.textContent = "Live stream interrupted. Polling for updates...";
        };
      }

      async function sendTyping(isTyping) {
        if (!session) return;
        const body = new URLSearchParams({
          userId: session.userId,
          displayName: session.displayName,
          room: session.room,
          isTyping: String(isTyping)
        });
        try {
          await fetch("/typing", { method: "POST", body });
        } catch {
          // Typing indicators are best effort.
        }
      }

      async function joinExistingSession(room, password = "") {
        if (!session) return;
        await sendTyping(false);
        const body = new URLSearchParams({
          name: session.displayName,
          room,
          password
        });
        const response = await fetch("/join", { method: "POST", body });
        if (!response.ok) {
          addSystem("Could not join that room.");
          return;
        }
        session = await response.json();
        lastEventId = 0;
        addSystem(session.message);
        renderRooms();
        await loadHistory();
        connectEvents();
        startPollingFallback();
      }

      joinForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const body = new URLSearchParams(new FormData(joinForm));
        const response = await fetch("/join", { method: "POST", body });
        if (!response.ok) {
          addSystem("Could not join the chat.");
          return;
        }

        session = await response.json();
        joinDialog.close();
        messageInput.disabled = false;
        sendButton.disabled = false;
        messageInput.focus();
        await loadHistory();
        addSystem(session.message);
        renderRooms();
        connectEvents();
        startPollingFallback();
      });

      roomForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const room = roomInput.value.trim();
        if (!room) return;
        const isPrivate = privateRoomInput.checked;
        const password = roomPasswordInput.value.trim();
        if (isPrivate && !password) {
          addSystem("Private rooms need a password.");
          return;
        }

        const body = new URLSearchParams({
          room,
          isPrivate: String(isPrivate),
          password
        });
        const response = await fetch("/rooms", { method: "POST", body });
        if (response.ok || response.status === 409) {
          roomInput.value = "";
          roomPasswordInput.value = "";
          await loadRooms();
          joinRoomInput.value = room;
          if (isPrivate && !privateRoomNames.includes(room)) {
            privateRoomNames.push(room);
            renderRooms();
          }
          if (isPrivate) {
            await joinExistingSession(room, password);
          }
        }
      });

      privateRoomInput.addEventListener("change", () => {
        roomPasswordInput.hidden = !privateRoomInput.checked;
      });

      joinPrivateButton.addEventListener("click", () => {
        privateRoomNameInput.value = "";
        privateDialog.showModal();
      });

      privateJoinForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const body = new URLSearchParams(new FormData(privateJoinForm));
        const room = body.get("room").trim();
        const password = body.get("password");
        await joinExistingSession(room, password);
        if (session && session.room === room) {
          if (!privateRoomNames.includes(room)) {
            privateRoomNames.push(room);
          }
          renderRooms();
          privateDialog.close();
        }
      });

      messageForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const text = messageInput.value.trim();
        if (!text || !session) return;

        messageInput.value = "";
        const body = new URLSearchParams({
          userId: session.userId,
          displayName: session.displayName,
          room: session.room,
          text
        });
        const response = await fetch("/send", { method: "POST", body });
        if (!response.ok) {
          addSystem("Message was not sent.");
        }
      });

      messageInput.addEventListener("input", () => {
        if (!session) return;
        sendTyping(true);
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => sendTyping(false), 1200);
      });

      startRoomRefresh();
      joinDialog.showModal();
    </script>
  </body>
</html>
