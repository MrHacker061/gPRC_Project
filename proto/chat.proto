syntax = "proto3";

package chat;

service ChatService {
  rpc Join(JoinRequest) returns (JoinResponse);
  rpc CreateRoom(CreateRoomRequest) returns (CreateRoomResponse);
  rpc ListRooms(ListRoomsRequest) returns (ListRoomsResponse);
  rpc SendMessage(ChatMessage) returns (SendMessageResponse);
  rpc SendTyping(TypingRequest) returns (TypingResponse);
  rpc Subscribe(SubscribeRequest) returns (stream ChatEvent);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc GetHistory(GetHistoryRequest) returns (GetHistoryResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
}

message JoinRequest {
  string display_name = 1;
  string room = 2;
}

message JoinResponse {
  string user_id = 1;
  string display_name = 2;
  string room = 3;
  string message = 4;
}

message Room {
  string name = 1;
  int64 created_at_unix_ms = 2;
}

message CreateRoomRequest {
  string room = 1;
}

message CreateRoomResponse {
  bool created = 1;
  string room = 2;
  string error = 3;
}

message ListRoomsRequest {}

message ListRoomsResponse {
  repeated Room rooms = 1;
}

message ChatMessage {
  string user_id = 1;
  string display_name = 2;
  string room = 3;
  string text = 4;
  int64 sent_at_unix_ms = 5;
}

message SendMessageResponse {
  bool accepted = 1;
  string error = 2;
}

message TypingRequest {
  string user_id = 1;
  string display_name = 2;
  string room = 3;
  bool is_typing = 4;
}

message TypingResponse {
  bool accepted = 1;
}

message SubscribeRequest {
  string user_id = 1;
  string room = 2;
}

message ChatEvent {
  enum EventType {
    MESSAGE = 0;
    USER_JOINED = 1;
    USER_LEFT = 2;
    SYSTEM = 3;
    TYPING = 4;
  }

  EventType type = 1;
  ChatMessage message = 2;
  string system_text = 3;
  repeated string active_users = 4;
  int64 event_id = 5;
  string typing_user = 6;
  bool is_typing = 7;
}

message ListEventsRequest {
  string room = 1;
  int64 after_event_id = 2;
}

message ListEventsResponse {
  repeated ChatEvent events = 1;
}

message GetHistoryRequest {
  string room = 1;
  int32 limit = 2;
}

message GetHistoryResponse {
  repeated ChatMessage messages = 1;
  int64 latest_event_id = 2;
}

message ListUsersRequest {
  string room = 1;
}

message ListUsersResponse {
  repeated string display_names = 1;
}
